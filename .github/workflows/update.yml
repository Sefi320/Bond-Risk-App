name: update-data
on:
  schedule: [{cron: "0 10 * * 1-5"}]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          
      - name: Install dependencies
        run: |
          install.packages(c("tidyquant", "tidyr", "dplyr", "arrow"))
        shell: Rscript {0}
        
      - run: Rscript Bond-Risk-App/feather_data.R
      
      - run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add Bond-Risk-App/feather_data/cmt_clean.feather
          git commit -m "auto: update cmt_clean.feather" || echo "no change"
          git push